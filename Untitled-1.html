<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found 3D Interactive Website</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* รีเซ็ตดีไซน์พื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            overflow-x: hidden;
            color: #333;
        }

        /* Canvas สำหรับแสดงผล 3D ให้อยู่กับที่ (Fixed) ด้านหลัง */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* ส่วนติดต่อผู้ใช้งาน (UI Layer) */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* เพื่อให้สามารถสกรอลล์ทะลุผ่านหน้าต่างนี้ได้ */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* โลโก้ GEMINI ด้านซ้ายบน */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .logo-main {
            font-size: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo-ge { color: #ad714f; } /* ส้มอมเทาออกขาวนิดๆ */
        .logo-mini { color: #a3a3a3; text-shadow: 1px 1px 1px rgba(0,0,0,0.1); } /* เทาออกขาวนิดๆ */
        .logo-sub {
            font-size: 15px;
            font-weight: 300;
            color: #000000;
            margin-top: -2px;
        }

        /* ปุ่มเรียนรู้เพิ่มเติม ด้านขวากลาง */
        .sidebar-links {
            position: absolute;
            right: 40px;
            top: 5%;
            transform: translateY(-50%);
            pointer-events: auto;
        }
        .btn-learn-more {
            font-size: 18px;
            font-weight: bold;
            color: #8fa89b; /* เขียวอ่อนอมเทา */
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .btn-learn-more:hover {
            color: #6d8276;
        }

        /* ส่วนของเนื้อหา/ข้อความที่จะเปลี่ยนไปตามการ Scroll */
        .scroll-container {
            position: relative;
            z-index: 5;
        }

        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            text-align: center;
        }

        /* สไตล์ข้อความ Section 1 */
        .title-s1 {
            font-size: 2.5rem;
            color: #222;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* สไตล์ข้อความ Section 2 */
        .title-s2 {
            font-size: 3.5rem;
            color: #111;
            font-weight: normal;
            line-height: 1.4;
            max-width: 800px;
            opacity: 0; /* ซ่อนไว้ก่อนเพื่อให้ GSAP ทำงานโผล่ขึ้นมา */
            transform: translateY(50px);
        }
        .bold-green {
            font-weight: bold;
            color: #335a42; /* เขียวเข้ม */
        }
        .bold-text {
            font-weight: bold;
        }

        .section-transition {
            position: relative;
            flex-direction: column;
            gap: 24px;
        }

        .transition-card {
            width: min(860px, 92vw);
            min-height: 520px;
            padding: 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(40px) scale(0.96);
            position: relative;
            overflow: hidden;
        }

        .login-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 999px;
            background: #111;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            box-shadow: 0 12px 24px rgba(17, 17, 17, 0.18);
            opacity: 0;
            transform: translateY(20px);
        }

        .login-btn.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        .form-shell {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 0;
            opacity: 0;
            transform: translateY(20px);
        }

        .form-shell.is-active {
            display: flex;
            animation: formFadeIn 0.35s ease forwards;
        }

        .form-top-bar {
            background: #111;
            color: #fff;
            padding: 14px 20px;
            border-radius: 16px 16px 0 0;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .profile-form {
            border: 1px solid rgba(0,0,0,0.08);
            border-top: none;
            background: #fff;
            padding: 22px;
            border-radius: 0 0 16px 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            font-size: 0.95rem;
            color: #222;
        }

        .field-group span {
            font-weight: 600;
        }

        .field-group input,
        .field-group select {
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }

        .field-group input:focus,
        .field-group select:focus {
            border-color: #111;
            box-shadow: 0 0 0 2px rgba(17,17,17,0.08);
        }

        .submit-bar {
            margin-top: 20px;
            background: #111;
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: flex-end;
        }

        .submit-bar button,
        .success-screen button {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            background: #fff;
            color: #111;
            font-weight: 700;
            cursor: pointer;
        }

        .success-screen {
            position: absolute;
            inset: 0;
            background: rgba(17, 17, 17, 0.97);
            color: #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
            padding: 24px;
        }

        .success-screen.is-active {
            display: flex;
            animation: formFadeIn 0.35s ease forwards;
        }

        .success-screen h2 {
            font-size: 2rem;
        }

        .success-screen p {
            font-size: 1rem;
            opacity: 0.8;
        }

        @keyframes formFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .transition-card {
                min-height: 560px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <div class="logo-container">
            <div class="logo-main"><span class="logo-ge">GE</span><span class="logo-mini">MINI</span></div>
            <div class="logo-sub">จีมินิ</div>
        </div>
        
        <div class="sidebar-links">
            <a href="#" class="btn-learn-more">เรียนรู้เพิ่มเติม</a>
        </div>
    </div>

    <div class="scroll-container">
        <section class="section" id="section1">
            <h1 class="title-s1">พวกเขากำลังตามหาเจ้าของ</h1>
        </section>

        <section class="section" id="section2">
            <h1 class="title-s2">
                คืนสิ่งของที่หล่นหายด้วย <br>
                <span class="bold-green">ความซื่อสัตย์</span> และ <span class="bold-text">บริสุทธิ์</span>
            </h1>
        </section>

        <section class="section section-transition" id="section3">
            <div class="transition-card">
                <button class="login-btn" id="login-btn">ล็อกอิน</button>

                <div class="form-shell" id="form-shell">
                    <div class="form-top-bar">ข้อมูลผู้ใช้</div>
                    <form id="signup-form" class="profile-form">
                        <div class="form-grid">
                            <label class="field-group">
                                <span>Email</span>
                                <input type="email" name="email" required placeholder="your@email.com">
                            </label>
                            <label class="field-group">
                                <span>เบอร์โทร</span>
                                <input type="tel" name="phone" required placeholder="081-234-5678">
                            </label>
                            <label class="field-group">
                                <span>ชื่อ-นามสกุล</span>
                                <input type="text" name="fullName" required placeholder="ชื่อ นามสกุล">
                            </label>
                            <label class="field-group">
                                <span>ชื่อเล่น</span>
                                <input type="text" name="nickname" required placeholder="ชื่อเล่น">
                            </label>
                            <label class="field-group">
                                <span>นามสมมุตติที่ต้องการแสดง</span>
                                <input type="text" name="displayName" required placeholder="ชื่อในโลกออนไลน์">
                            </label>
                            <label class="field-group">
                                <span>โรงเรียน</span>
                                <input type="text" name="school" required placeholder="ชื่อโรงเรียน">
                            </label>
                            <label class="field-group">
                                <span>ชั้น</span>
                                <input type="text" name="grade" required placeholder="ชั้น">
                            </label>
                            <label class="field-group">
                                <span>ห้อง</span>
                                <input type="text" name="room" required placeholder="ห้อง">
                            </label>
                            <label class="field-group">
                                <span>เลขที่</span>
                                <input type="text" name="number" required placeholder="เลขที่">
                            </label>
                            <label class="field-group">
                                <span>เพศ</span>
                                <select name="gender" required>
                                    <option value="">เลือกเพศ</option>
                                    <option value="ชาย">ชาย</option>
                                    <option value="หญิง">หญิง</option>
                                    <option value="ไม่ต้องการระบุ">ไม่ต้องการระบุ</option>
                                </select>
                            </label>
                        </div>
                        <div class="submit-bar">
                            <button type="submit">ยืนยัน</button>
                        </div>
                    </form>
                </div>

                <div class="success-screen" id="success-screen">
                    <h2>ยินดีต้อนรับ</h2>
                    <p>ข้อมูลของคุณถูกส่งเรียบร้อยแล้ว</p>
                    <button id="restart-btn">เริ่มใช้งาน</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- 1. SET UP THREE.JS SCENE ---
        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene();
        
        // สร้างมุมกล้อง (Camera)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        // เริ่มต้นที่มุมมองจากด้านบนลงมา (Top-down View)
        camera.position.set(0, 7, 0); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // แสงสว่าง (Lighting) เพื่อให้วัตถุมีมิติและเงาที่นุ่มนวล
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // --- 2. CREATE 3D OBJECTS (จำลองสิ่งของต่างๆ) ---
        // กลุ่มรวมวัตถุทั้งหมดเพื่อให้หมุนไปพร้อมๆ กันได้ง่าย
        const itemsGroup = new THREE.Group();
        scene.add(itemsGroup);

        // ฟังก์ชันสร้างวัสดุสีขาว/เทามินิมอล คล้ายในตัวอย่างวิดีโอ
        const itemMaterial = new THREE.MeshStandardMaterial({
            color: 0xdddddd,
            roughness: 0.3,
            metalness: 0.1
        });

        // 1) บัตรประชาชน (จำลองด้วยแผ่นสี่เหลี่ยมหนาบางๆ)
        const idCardGeo = new THREE.BoxGeometry(1.6, 0.05, 1.0);
        const idCard = new THREE.Mesh(idCardGeo, itemMaterial);
        idCard.position.set(-2.5, 0, -1.5);
        itemsGroup.add(idCard);

        // 2) กุญแจรถ (จำลองด้วยแท่งสี่เหลี่ยมขนาดเล็ก)
        const keyGeo = new THREE.BoxGeometry(0.5, 0.1, 1.0);
        const carKey = new THREE.Mesh(keyGeo, itemMaterial);
        carKey.position.set(2.5, 0, -1.8);
        itemsGroup.add(carKey);

        // 3) กระเป๋าเงิน (จำลองด้วยกล่องสี่เหลี่ยมผืนผ้า)
        const walletGeo = new THREE.BoxGeometry(1.5, 0.2, 1.2);
        const wallet = new THREE.Mesh(walletGeo, itemMaterial);
        wallet.position.set(-2.2, 0, 1.5);
        itemsGroup.add(wallet);

        // 4) ธนบัตร (จำลองด้วยแผ่นระนาบแบนๆ ดัดโค้งเล็กน้อย)
        const billGeo = new THREE.BoxGeometry(1.8, 0.02, 0.9);
        const bill = new THREE.Mesh(billGeo, itemMaterial);
        bill.position.set(2.2, 0, 1.3);
        bill.rotation.y = Math.PI / 4;
        itemsGroup.add(bill);

        // 5) เหรียญต่างๆ (จำลองด้วยทรงกระบอกเตี้ยๆ หลายขนาด)
        const coinGroup = new THREE.Group();
        coinGroup.position.set(0, -0.5, 2.2); // อยู่บริเวณด้านล่างของข้อความ

        const coin10Geo = new THREE.CylinderGeometry(0.35, 0.35, 0.08, 32);
        const coin10 = new THREE.Mesh(coin10Geo, itemMaterial);
        coin10.position.set(-0.5, 0, 0);
        coin10.rotation.x = Math.PI / 2;

        const coin5Geo = new THREE.CylinderGeometry(0.28, 0.28, 0.06, 32);
        const coin5 = new THREE.Mesh(coin5Geo, itemMaterial);
        coin5.position.set(0.2, 0.2, -0.2);
        coin5.rotation.set(Math.PI / 2.5, 0, 0.3);

        const coin1Geo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32);
        const coin1 = new THREE.Mesh(coin1Geo, itemMaterial);
        coin1.position.set(0.5, -0.1, 0.2);
        coin1.rotation.set(Math.PI / 3, 0.5, 0);

        coinGroup.add(coin10, coin5, coin1);
        itemsGroup.add(coinGroup);

        // สุ่มการเอียงเริ่มต้นของสิ่งของแต่ละชิ้นเพื่อให้ดูมีมิติการลอยแบบธรรมชาติ
        itemsGroup.children.forEach(item => {
            if(item !== coinGroup) {
                item.rotation.set(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 0.5
                );
            }
        });


        // --- 3. ANIMATION LOOP (ทำให้สิ่งของลอยเอื่อยๆ) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // ทำให้วัตถุขยับขึ้นลงและหมุนช้าๆ จำลองสภาวะลอยไร้น้ำหนัก (Floating Effect)
            itemsGroup.children.forEach((item, index) => {
                item.position.y += Math.sin(elapsedTime + index * 2) * 0.002;
                item.rotation.x += Math.cos(elapsedTime + index) * 0.001;
                item.rotation.y += Math.sin(elapsedTime + index) * 0.001;
            });

            renderer.render(scene, camera);
        }
        animate();


        // --- 4. SCROLL ANIMATION ด้วย GSAP & SCROLLTRIGGER ---
        // ลงทะเบียนปลั๊กอิน ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // สร้าง Timeline สำหรับผูกการเคลื่อนไหวเข้ากับการสกรอลล์หน้าจอ
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-container", // ตัวจุดชนวนการเช็คระยะสกรอลล์
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5, // ค่าความสมูทในการเลื่อน (ยิ่งมากยิ่งนุ่มนวล)
            }
        });

        // ค่อยๆ เปลี่ยนมุมกล้องจาก มองด้านบน (0, 7, 0) -> มาเป็นหน้าตรง (0, 0, 6.5) อย่างสมูท
        tl.to(camera.position, {
            x: 0,
            y: 0,
            z: 6.5,
            ease: "power2.inOut"
        }, 0);

        // ปรับทิศทางการมองของกล้องให้อยู่ตรงกลางเสมอในขณะเปลี่ยนองศา
        tl.to(camera.rotation, {
            x: 0,
            y: 0,
            z: 0,
            ease: "power2.inOut"
        }, 0);

        // ดึงข้อความใน Section 1 ให้ค่อยๆ เฟดหายไปพร้อมขยับขึ้นเมื่อเลื่อนลง
        tl.to(".title-s1", {
            opacity: 0,
            y: -100,
            ease: "power1.out"
        }, 0);

        // ค่อยๆ แสดงข้อความขนาดใหญ่ใน Section 2 (เลื่อนขึ้นและจางเข้ามาระหว่างสกรอลล์)
        tl.to(".title-s2", {
            opacity: 1,
            y: 0,
            ease: "power2.out"
        }, 0.4);

        // เมื่อเลื่อนต่อไปอีก ชิ้นงาน 3D และข้อความตรงกลางจะค่อยๆจางหาย
        // และแทนที่ด้วยปุ่มล็อกอินและฟอร์มสมัครสมาชิก
        tl.to(canvas, {
            opacity: 0,
            ease: "power2.inOut"
        }, 0.8);

        tl.to(".title-s2", {
            opacity: 0,
            y: -40,
            ease: "power2.inOut"
        }, 0.8);

        tl.to(".transition-card", {
            opacity: 1,
            y: 0,
            scale: 1,
            ease: "power2.out"
        }, 0.9);

        tl.to(".login-btn", {
            opacity: 1,
            y: 0,
            ease: "power2.out"
        }, 1.0);

        // --- 5. INTERACTION สำหรับปุ่มล็อกอิน / ฟอร์ม / หน้าต่างใหม่ ---
        const loginBtn = document.getElementById('login-btn');
        const formShell = document.getElementById('form-shell');
        const successScreen = document.getElementById('success-screen');
        const signupForm = document.getElementById('signup-form');
        const restartBtn = document.getElementById('restart-btn');

        loginBtn.addEventListener('click', () => {
            loginBtn.classList.add('is-hidden');
            formShell.classList.add('is-active');
        });

        signupForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(signupForm);
            const payload = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error('ส่งข้อมูลไม่สำเร็จ');
                }

                formShell.classList.remove('is-active');
                successScreen.classList.add('is-active');
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            }
        });

        restartBtn.addEventListener('click', () => {
            successScreen.classList.remove('is-active');
            formShell.classList.remove('is-active');
            loginBtn.classList.remove('is-hidden');
            signupForm.reset();
        });

        // --- 6. RESPONSIVE DESIGN (รองรับการย่อ/ขยายหน้าจอ) ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
